name: WoW Addon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Lua
      uses: leafo/gh-actions-lua@v10
      with:
        luaVersion: "5.1"

    - name: Install Luacheck & Busted
      run: |
        luarocks install luacheck
        luarocks install busted

    - name: Run Linter (Luacheck)
      run: luacheck .

    - name: Run Unit Tests (Busted)
      run: busted tests/

    - name: Validate Localization Files
      run: lua Scripts/validate_locales.lua

    - name: Validate Waypoint Coordinates
      run: lua Scripts/validate_waypoints.lua
